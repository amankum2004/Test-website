<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador - Biología Celular</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', Tahoma, sans-serif; background: linear-gradient(135deg, #fff5f7 0%, #fce4ec 100%); min-height: 100vh; display: flex; justify-content: center; align-items: flex-start; padding: 20px; }
#app { width: 100%; max-width: 680px; margin: auto; }
.screen { background: #fff; border-radius: 24px; padding: 2rem; box-shadow: 0 8px 32px rgba(255,150,170,0.18); animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
.logo { font-size: 3.5rem; text-align: center; margin-bottom: 0.5rem; }
h1 { text-align: center; color: #e57373; font-size: 1.6rem; margin-bottom: 0.3rem; }
h2 { text-align: center; color: #e57373; margin-bottom: 0.5rem; }
.subtitle { text-align: center; color: #aaa; font-size: 0.95rem; margin-bottom: 0.5rem; }
.fecha { text-align: center; color: #ccc; font-size: 0.85rem; margin-bottom: 1.2rem; }
.info-cards { display: flex; gap: 12px; justify-content: center; margin-bottom: 1.5rem; }
.info-card { background: #fff5f7; border: 1.5px solid #ffd6dc; border-radius: 12px; padding: 10px 18px; font-size: 0.9rem; color: #e57373; display: flex; gap: 8px; align-items: center; font-weight: 600; }
.btn-primary { display: block; width: 100%; padding: 14px; background: linear-gradient(135deg,#ff8a95,#e57373); color: #fff; border: none; border-radius: 14px; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform 0.2s,box-shadow 0.2s; }
.btn-primary:hover { transform: translateY(-2px); box-shadow: 0 6px 18px rgba(229,115,115,0.35); }
.btn-secondary { padding: 10px 20px; background: #fff5f7; color: #e57373; border: 1.5px solid #ffd6dc; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-secondary:hover { background: #ffe4e8; }
.btn-mark { padding: 10px 20px; background: #fffde7; color: #f9a825; border: 1.5px solid #ffe082; border-radius: 12px; font-size: 0.9rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-mark.active { background: #ffe082; color: #f57f17; }
.btn-icon { background: #fff5f7; border: 1.5px solid #ffd6dc; color: #e57373; border-radius: 10px; padding: 8px 12px; font-size: 1rem; cursor: pointer; transition: all 0.2s; }
.btn-finish { display: block; width: 100%; margin-top: 12px; padding: 12px; background: transparent; color: #e57373; border: 2px solid #ffd6dc; border-radius: 14px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-finish:hover { background: #fff5f7; border-color: #e57373; }
.quiz-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
.timer-box { display: flex; align-items: center; gap: 6px; background: #fff5f7; border: 1.5px solid #ffd6dc; border-radius: 12px; padding: 8px 14px; }
#cronometro { font-size: 1.1rem; font-weight: 700; color: #e57373; font-variant-numeric: tabular-nums; }
.quiz-meta { display: flex; align-items: center; gap: 10px; color: #bbb; font-size: 0.9rem; font-weight: 600; }
#barraProgreso { height: 6px; background: #ffe4e8; border-radius: 4px; margin-bottom: 14px; overflow: hidden; }
#progreso { height: 100%; background: linear-gradient(90deg,#ff8a95,#e57373); border-radius: 4px; transition: width 0.4s ease; }
#mapa-preguntas { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 16px; }
.mapa-btn { width: 32px; height: 32px; border-radius: 8px; border: 1.5px solid #ffd6dc; background: #fff; color: #ccc; font-size: 0.75rem; font-weight: 700; cursor: pointer; transition: all 0.15s; }
.mapa-btn:hover { border-color: #e57373; color: #e57373; }
.mapa-btn.respondida { background: #e8f5e9; border-color: #a5d6a7; color: #388e3c; }
.mapa-btn.marcada { background: #fffde7; border-color: #ffe082; color: #f9a825; }
.mapa-btn.actual { background: #e57373; border-color: #e57373; color: #fff; }
.question-card { background: #fff; border: 1.5px solid #ffe4e8; border-radius: 16px; padding: 1.4rem; margin-bottom: 14px; }
.question-type-badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; }
.badge-multiple { background: #fce4ec; color: #e57373; }
.badge-abierta { background: #e8eaf6; color: #5c6bc0; }
.question-text { font-size: 1.1rem; color: #444; font-weight: 500; line-height: 1.5; margin-bottom: 16px; }
.opcion { display: flex; align-items: center; gap: 10px; padding: 12px 14px; margin: 7px 0; border: 1.5px solid #ffd6dc; border-radius: 12px; cursor: pointer; transition: all 0.15s; font-size: 0.95rem; color: #555; }
.opcion:hover { background: #fff5f7; border-color: #e57373; }
.opcion.selected { background: #fce4ec; border-color: #e57373; color: #c62828; font-weight: 600; }
.opcion-letra { width: 28px; height: 28px; border-radius: 50%; border: 1.5px solid #ffd6dc; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 0.85rem; color: #e57373; flex-shrink: 0; transition: all 0.15s; }
.opcion.selected .opcion-letra { background: #e57373; border-color: #e57373; color: #fff; }
.open-answer { width: 100%; min-height: 110px; padding: 12px; border: 1.5px solid #ffd6dc; border-radius: 12px; font-family: inherit; font-size: 0.95rem; color: #555; resize: vertical; outline: none; transition: border-color 0.2s; }
.open-answer:focus { border-color: #e57373; }
.nav-buttons { display: flex; justify-content: space-between; gap: 8px; margin-bottom: 8px; }
.score-box { background: #fff5f7; border: 1.5px solid #ffd6dc; border-radius: 16px; padding: 1.5rem; margin: 1rem 0; text-align: center; }
.score-number { font-size: 3rem; font-weight: 800; color: #e57373; }
.score-label { color: #aaa; font-size: 0.9rem; }
.score-details { display: flex; justify-content: center; gap: 24px; margin-top: 12px; flex-wrap: wrap; }
.score-stat { text-align: center; }
.score-stat .val { font-size: 1.3rem; font-weight: 700; color: #555; }
.score-stat .lbl { font-size: 0.78rem; color: #aaa; }
.fin-buttons { display: flex; flex-direction: column; gap: 10px; margin-top: 1rem; }
.overlay { position: fixed; inset: 0; background: rgba(255,245,247,0.96); display: flex; justify-content: center; align-items: center; z-index: 100; }
.pause-card { background: #fff; border-radius: 24px; padding: 2.5rem; text-align: center; box-shadow: 0 8px 32px rgba(229,115,115,0.2); }
.pause-card h2 { color: #e57373; margin: 0.5rem 0; }
.pause-card p { color: #aaa; margin-bottom: 1.5rem; }
.modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.3); display: flex; justify-content: center; align-items: center; z-index: 200; }
.modal-card { background: #fff; border-radius: 20px; padding: 2rem; max-width: 340px; width: 90%; text-align: center; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
.modal-card h3 { color: #e57373; margin-bottom: 0.5rem; }
.modal-card p { color: #888; font-size: 0.9rem; margin-bottom: 1.2rem; }
.modal-btns { display: flex; gap: 10px; }
.modal-btns button { flex: 1; }
@media (max-width:480px) { .screen { padding: 1.3rem; } .nav-buttons { flex-wrap: wrap; } .nav-buttons button { flex: 1; } .mapa-btn { width: 28px; height: 28px; font-size: 0.7rem; } }
</style>
</head>
<body>
<div id="app">

  <!-- INICIO -->
  <div id="pantalla-inicio" class="screen">
    <div class="logo">🧬</div>
    <h1>Simulador de Biología Celular</h1>
    <p class="subtitle">20 preguntas · Cronómetro · Revisión detallada</p>
    <p id="fecha" class="fecha"></p>
    <div class="info-cards">
      <div class="info-card"><span>📝</span><span>15 Opción múltiple</span></div>
      <div class="info-card"><span>✍️</span><span>5 Preguntas abiertas</span></div>
    </div>
    <button class="btn-primary" onclick="iniciarSimulacro()">Comenzar simulacro</button>
  </div>

  <!-- QUIZ -->
  <div id="pantalla-quiz" class="screen" style="display:none">
    <div class="quiz-header">
      <div class="timer-box">
        <span>⏱</span>
        <span id="cronometro">00:00:00</span>
      </div>
      <div class="quiz-meta">
        <span id="contador-preguntas">1 / 20</span>
        <button class="btn-icon" id="btnPausa" onclick="togglePausa()">⏸</button>
      </div>
    </div>
    <div id="barraProgreso"><div id="progreso"></div></div>
    <div id="mapa-preguntas"></div>
    <div id="contenedorPregunta" class="question-card"></div>
    <div class="nav-buttons">
      <button class="btn-secondary" onclick="anterior()">← Anterior</button>
      <button class="btn-mark" id="btnMarcar" onclick="marcar()">🔖 Marcar</button>
      <button class="btn-secondary" onclick="siguiente()">Siguiente →</button>
    </div>
    <button class="btn-finish" onclick="confirmarFinalizar()">Terminar simulacro</button>
  </div>

  <!-- PAUSA -->
  <div id="pantalla-pausa" class="overlay" style="display:none">
    <div class="pause-card">
      <div style="font-size:3rem">⏸</div>
      <h2>Simulacro pausado</h2>
      <p>Tu progreso está guardado.</p>
      <button class="btn-primary" onclick="togglePausa()">Reanudar</button>
    </div>
  </div>

  <!-- FIN -->
  <div id="pantalla-fin" class="screen" style="display:none">
    <div class="logo">✅</div>
    <h2>Simulacro completado</h2>
    <div id="resumen-score"></div>
    <div class="fin-buttons">
      <button class="btn-primary" onclick="descargarRevision()">📥 Descargar revisión</button>
      <button class="btn-secondary" onclick="reiniciar()">🔄 Volver a intentar</button>
    </div>
  </div>

</div>

<script>
const preguntas = [
  { enunciado: "¿Cuál es la función principal de la membrana plasmática?", tipo: 'multiple', opciones: ['A. Produce ATP', 'B. Controla el intercambio de sustancias', 'C. Almacena ADN', 'D. Sintetiza proteínas'], correcta: 'B. Controla el intercambio de sustancias' },
  { enunciado: "¿Qué organelo produce la mayor parte del ATP?", tipo: 'multiple', opciones: ['A. Lisosoma', 'B. Mitocondria', 'C. Ribosoma', 'D. Núcleo'], correcta: 'B. Mitocondria' },
  { enunciado: "¿Qué estructura tienen en común procariotas y eucariotas?", tipo: 'multiple', opciones: ['A. Núcleo', 'B. Mitocondrias', 'C. Ribosomas', 'D. Golgi'], correcta: 'C. Ribosomas' },
  { enunciado: "En una solución hipertónica, una célula animal...", tipo: 'multiple', opciones: ['A. Gana agua', 'B. Pierde agua', 'C. No cambia', 'D. Se divide'], correcta: 'B. Pierde agua' },
  { enunciado: "La difusión facilitada requiere...", tipo: 'multiple', opciones: ['A. ATP', 'B. Proteínas de membrana', 'C. ADN', 'D. Oxígeno'], correcta: 'B. Proteínas de membrana' },
  { enunciado: "¿Qué ocurre en la profase?", tipo: 'multiple', opciones: ['A. Se alinean los cromosomas', 'B. Se condensan los cromosomas', 'C. Se separan las cromátidas', 'D. Se forman dos núcleos'], correcta: 'B. Se condensan los cromosomas' },
  { enunciado: "La mitosis produce...", tipo: 'multiple', opciones: ['A. 4 células distintas', 'B. 2 células idénticas', 'C. Gametos', 'D. Esporas'], correcta: 'B. 2 células idénticas' },
  { enunciado: "¿Cuál de estos organelos NO tiene membrana?", tipo: 'multiple', opciones: ['A. Ribosoma', 'B. Mitocondria', 'C. Núcleo', 'D. Retículo endoplasmático'], correcta: 'A. Ribosoma' },
  { enunciado: "El aparato de Golgi principalmente...", tipo: 'multiple', opciones: ['A. Produce glucosa', 'B. Modifica y empaqueta proteínas', 'C. Replica el ADN', 'D. Produce ATP'], correcta: 'B. Modifica y empaqueta proteínas' },
  { enunciado: "Los lisosomas contienen...", tipo: 'multiple', opciones: ['A. Pigmentos', 'B. Enzimas digestivas', 'C. ADN', 'D. Hemoglobina'], correcta: 'B. Enzimas digestivas' },
  { enunciado: "¿Dónde se sintetizan las proteínas?", tipo: 'multiple', opciones: ['A. Ribosomas', 'B. Lisosomas', 'C. Aparato de Golgi', 'D. Centriolos'], correcta: 'A. Ribosomas' },
  { enunciado: "La ósmosis es...", tipo: 'multiple', opciones: ['A. Movimiento de solutos', 'B. Movimiento de agua a través de membrana semipermeable', 'C. Transporte activo', 'D. Endocitosis'], correcta: 'B. Movimiento de agua a través de membrana semipermeable' },
  { enunciado: "¿Qué fase de la mitosis sigue a la metafase?", tipo: 'multiple', opciones: ['A. Profase', 'B. Telofase', 'C. Anafase', 'D. Interfase'], correcta: 'C. Anafase' },
  { enunciado: "El citoesqueleto sirve para...", tipo: 'multiple', opciones: ['A. Almacenar genes', 'B. Dar forma a la célula y transporte interno', 'C. Realizar la respiración', 'D. Fotosíntesis'], correcta: 'B. Dar forma a la célula y transporte interno' },
  { enunciado: "La interfase del ciclo celular incluye...", tipo: 'multiple', opciones: ['A. Solo G1', 'B. G1, S y G2', 'C. Solo la fase M', 'D. La citocinesis'], correcta: 'B. G1, S y G2' },
  { enunciado: "Define brevemente qué es el transporte activo.", tipo: 'abierta' },
  { enunciado: "Explica una diferencia clave entre el ADN y el ARN.", tipo: 'abierta' },
  { enunciado: "¿Por qué las mitocondrias son abundantes en las células musculares?", tipo: 'abierta' },
  { enunciado: "Caso clínico: una toxina impide el funcionamiento de los ribosomas. ¿Qué proceso celular se vería afectado primero y por qué?", tipo: 'abierta' },
  { enunciado: "En una escala del 1 al 10, ¿cómo calificas tu confianza en los temas de biología celular vistos hoy? Justifica tu respuesta.", tipo: 'abierta' }
];

let tiempoSegundos = 0, intervalId = null, pausado = false;
let respuestas = {}, marcadas = new Set(), currentIndex = 0;

document.getElementById('fecha').innerText = new Date().toLocaleDateString('es-ES', { weekday:'long', year:'numeric', month:'long', day:'numeric' });

function iniciarSimulacro() {
  document.getElementById('pantalla-inicio').style.display = 'none';
  document.getElementById('pantalla-quiz').style.display = 'block';
  tiempoSegundos = 0; pausado = false; respuestas = {}; marcadas = new Set(); currentIndex = 0;
  clearInterval(intervalId);
  intervalId = setInterval(() => { if (!pausado) { tiempoSegundos++; document.getElementById('cronometro').innerText = formatTime(tiempoSegundos); } }, 1000);
  renderMapa(); renderizarPregunta();
}

function formatTime(s) {
  return [Math.floor(s/3600), Math.floor((s%3600)/60), s%60].map(n => String(n).padStart(2,'0')).join(':');
}

function togglePausa() {
  pausado = !pausado;
  const ps = document.getElementById('pantalla-pausa');
  const btn = document.getElementById('btnPausa');
  ps.style.display = pausado ? 'flex' : 'none';
  btn.innerText = pausado ? '▶' : '⏸';
}

function renderizarPregunta() {
  const p = preguntas[currentIndex];
  document.getElementById('contador-preguntas').innerText = `${currentIndex + 1} / ${preguntas.length}`;
  document.getElementById('progreso').style.width = `${((currentIndex + 1) / preguntas.length) * 100}%`;
  const badge = p.tipo === 'multiple'
    ? `<span class="question-type-badge badge-multiple">Opción múltiple</span>`
    : `<span class="question-type-badge badge-abierta">Pregunta abierta</span>`;
  let body = '';
  if (p.tipo === 'multiple') {
    body = p.opciones.map(opt => {
      const letra = opt.split('.')[0];
      const sel = respuestas[currentIndex] === opt ? 'selected' : '';
      const safeOpt = opt.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
      return `<div class="opcion ${sel}" onclick="seleccionar('${safeOpt}')"><span class="opcion-letra">${letra}</span><span>${opt.substring(3)}</span></div>`;
    }).join('');
  } else {
    const val = (respuestas[currentIndex] || '').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    body = `<textarea class="open-answer" placeholder="Escribe tu respuesta aquí..." oninput="guardarAbierta(this.value)">${val}</textarea>`;
  }
  const esMarcada = marcadas.has(currentIndex);
  document.getElementById('btnMarcar').className = 'btn-mark' + (esMarcada ? ' active' : '');
  document.getElementById('btnMarcar').innerText = esMarcada ? '🔖 Marcada' : '🔖 Marcar';
  document.getElementById('contenedorPregunta').innerHTML = `${badge}<div class="question-text">${currentIndex+1}. ${p.enunciado}</div>${body}`;
  renderMapa();
}

function renderMapa() {
  document.getElementById('mapa-preguntas').innerHTML = preguntas.map((_, i) => {
    let cls = 'mapa-btn';
    if (i === currentIndex) cls += ' actual';
    else if (marcadas.has(i)) cls += ' marcada';
    else if (respuestas[i] !== undefined && respuestas[i] !== '') cls += ' respondida';
    return `<button class="${cls}" onclick="irA(${i})">${i+1}</button>`;
  }).join('');
}

function seleccionar(opt) { respuestas[currentIndex] = opt; renderizarPregunta(); }
function guardarAbierta(val) { respuestas[currentIndex] = val; renderMapa(); }
function marcar() { marcadas.has(currentIndex) ? marcadas.delete(currentIndex) : marcadas.add(currentIndex); renderizarPregunta(); }
function anterior() { if (currentIndex > 0) { currentIndex--; renderizarPregunta(); } }
function siguiente() { if (currentIndex < preguntas.length - 1) { currentIndex++; renderizarPregunta(); } }
function irA(i) { currentIndex = i; renderizarPregunta(); }

function confirmarFinalizar() {
  const sinResponder = preguntas.filter((_, i) => !respuestas[i] || respuestas[i] === '').length;
  const modal = document.createElement('div');
  modal.className = 'modal-overlay'; modal.id = 'modal-confirmar';
  modal.innerHTML = `<div class="modal-card"><h3>¿Terminar simulacro?</h3><p>${sinResponder > 0 ? `Tienes <strong>${sinResponder} pregunta(s) sin responder</strong>.` : 'Has respondido todas las preguntas.'}</p><div class="modal-btns"><button class="btn-secondary" onclick="cerrarModal()">Cancelar</button><button class="btn-primary" onclick="finalizar()">Terminar</button></div></div>`;
  document.body.appendChild(modal);
}

function cerrarModal() { const m = document.getElementById('modal-confirmar'); if (m) m.remove(); }

function finalizar() {
  cerrarModal(); clearInterval(intervalId);
  document.getElementById('pantalla-quiz').style.display = 'none';
  document.getElementById('pantalla-pausa').style.display = 'none';
  document.getElementById('pantalla-fin').style.display = 'block';
  const multiple = preguntas.filter(p => p.tipo === 'multiple');
  const correctas = multiple.filter(p => respuestas[preguntas.indexOf(p)] === p.correcta).length;
  const pct = Math.round((correctas / multiple.length) * 100);
  const sinResponder = preguntas.filter((_, i) => !respuestas[i] || respuestas[i] === '').length;
  document.getElementById('resumen-score').innerHTML = `<div class="score-box"><div class="score-number">${pct}%</div><div class="score-label">puntaje en opción múltiple</div><div class="score-details"><div class="score-stat"><div class="val" style="color:#4caf50">${correctas}</div><div class="lbl">Correctas</div></div><div class="score-stat"><div class="val" style="color:#e57373">${multiple.length - correctas}</div><div class="lbl">Incorrectas</div></div><div class="score-stat"><div class="val" style="color:#ff9800">${sinResponder}</div><div class="lbl">Sin responder</div></div><div class="score-stat"><div class="val">${formatTime(tiempoSegundos)}</div><div class="lbl">Tiempo</div></div></div></div>`;
}

function descargarRevision() {
  let html = `<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8"><title>Revisión</title><style>body{font-family:sans-serif;background:#fff5f7;padding:40px;color:#555;max-width:700px;margin:auto}h1{color:#e57373}.pregunta{background:#fff;border-radius:14px;padding:18px;margin-bottom:16px;border:1.5px solid #ffd6dc}.tag{display:inline-block;padding:3px 10px;border-radius:20px;font-size:.8rem;font-weight:700;margin-right:6px}.ok{background:#e8f5e9;color:#388e3c}.fail{background:#fce4ec;color:#c62828}.open-tag{background:#e8eaf6;color:#5c6bc0}.marked-tag{background:#fffde7;color:#f9a825}</style></head><body>`;
  html += `<h1>🧬 Revisión — Biología Celular</h1><p>Fecha: ${new Date().toLocaleDateString('es-ES',{year:'numeric',month:'long',day:'numeric'})} | Tiempo: ${formatTime(tiempoSegundos)}</p>`;
  preguntas.forEach((p, i) => {
    const r = respuestas[i] || 'Sin respuesta';
    const marked = marcadas.has(i) ? '<span class="tag marked-tag">🔖 Marcada</span>' : '';
    let eval_ = p.tipo === 'multiple'
      ? (r === p.correcta ? '<span class="tag ok">✓ Correcta</span>' : `<span class="tag fail">✗ Incorrecta</span> Correcta: <b>${p.correcta}</b>`)
      : '<span class="tag open-tag">Abierta</span>';
    html += `<div class="pregunta"><b>${i+1}. ${p.enunciado}</b> ${marked}<br>Tu respuesta: ${r}<br>${eval_}</div>`;
  });
  html += `</body></html>`;
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([html], {type:'text/html'}));
  a.download = `Revision_Biologia_${new Date().toISOString().slice(0,10)}.html`;
  a.click();
}

function reiniciar() {
  document.getElementById('pantalla-fin').style.display = 'none';
  document.getElementById('pantalla-inicio').style.display = 'block';
}
</script>
</body>
</html>
